# See docs at: https://mystmd.org/guide/frontmatter
version: 1
extends:
  - https://raw.githubusercontent.com/projectpythia/pythia-config/main/pythia.yml
project:
  id: e2f37f9f-71cd-417e-8302-3fb52caa76c4
  title: CMIP6 Cookbook
  github: https://github.com/projectpythia/cmip6-cookbook
  authors:
    - name: Ryan Abernathey
    - name: Henri Drake
    - r-ford
    - mgrover1
  copyright: '2024'
  toc:
    - file: README.md
    - title: Preamble
      children:
        - file: notebooks/how-to-cite.md
    - title: Foundations
      children:
        - file: notebooks/foundations/google-cloud-basic.ipynb
        - file: notebooks/foundations/intake-esm.ipynb
    - title: Example workflows
      children:
        - file: notebooks/example-workflows/ecs-cmip6.ipynb
        - file: notebooks/example-workflows/gmst.ipynb
        - file: notebooks/example-workflows/precip-freq.ipynb
        - file: notebooks/example-workflows/xesmf-ohu.ipynb
  jupyter:
      binder:
        url: https://binder.projectpythia.org/
        repo: projectpythia/cmip6-cookbook
        ref: main
  error_rules:
    - rule: link-resolves
      severity: ignore
      keys:
        - 'https://doi.org/**'
        - 'https://unece.org/fileadmin/**'
